    - method: GET
      resource: /sensitive
      headers:
        - key: X-IBM-Client-Id
          value: ${clientId}
      parameters: []
      assertions:
        $ref: default:GET-sensitive-200:1.0
      var: []
    - method: GET
      resource: /api
      headers:
        - key: X-IBM-Client-Id
          value: ${clientId}
      parameters: []
      assertions:
        $ref: default:GET-api-200:1.0
      var: []
