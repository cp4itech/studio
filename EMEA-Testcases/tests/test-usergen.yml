kind: test
apiVersion: api.ibm.com/v1
metadata:
  namespace: EMEA-Testcases
  name: test-usergen
  version: "1.0"
  tags: []
spec:
  api:
    $endpoint: https://rgw.apic-1ea39f2197613090e80c4981ab6eab96-0000.eu-de.containers.appdomain.cloud/apic/cms-idg-nano/randomuser.me
  environment:
    $ref: EMEA-Testcases:testdetails:1.0
  request:
    - method: GET
