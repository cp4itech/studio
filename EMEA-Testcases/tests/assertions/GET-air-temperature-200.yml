kind: assertion
metadata:
  version: '1.0'
  namespace: default
  name: GET-air-temperature-200
  tags: []
apiVersion: api.ibm.com/v1
spec:
  - name: Validate the response status code
    key: code
    action: equals
    value: 200
  - name: Validate content type header
    key: responseHeaders.content-type
    action: equals
    value: application/json
  - name: Validate response schema
    key: json()
    action: validateSchema
    value:
      type: object
      properties:
        items:
          type: array
          description: List of station temperature readings
          items:
            type: object
            properties:
              station_id:
                type: string
                description: Unique station identifier
              timestamp:
                type: string
                format: date-time
                description: The time of the reading
              temperature:
                type: number
                description: Air temperature in degree Celsius
            required:
              - station_id
              - timestamp
              - temperature
        api_info:
          type: object
          properties:
            status:
              type: string
              description: Status of the API response
            version:
              type: string
              description: API version
          required:
            - status
            - version
